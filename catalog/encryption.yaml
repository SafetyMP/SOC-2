# Catalog — Encryption
# SOC 2: CC6.1, C1 (Confidentiality). ISO 27001:2022: A.8.24 (cryptography), A.8.12 (data leakage).

- id: CTRL-ENC-001
  title: Encryption at rest enabled on all data stores and volumes
  soc2: [CC6.1, C1.1]
  iso27001: [A.8.24]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - encryption.at_rest_required
  guidance: |
    S3/Object Storage/Google Cloud Storage buckets, EBS/disk volumes, managed
    databases, and message queues must have at-rest encryption enabled.
    Customer-managed keys (CMK) are preferred for production data.

- id: CTRL-ENC-003
  title: Customer-managed keys (CMK) required for production data stores
  soc2: [CC6.1, C1.1]
  iso27001: [A.8.24]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - encryption.cmk_required_for_prod
  guidance: |
    Production-classified data stores use customer-managed keys with defined
    rotation, not provider-default managed keys. Non-prod may use defaults.

- id: CTRL-ENC-010
  title: Secrets and credentials are never stored unencrypted in code or config
  soc2: [CC6.1, C1.1]
  iso27001: [A.8.24, A.8.12]
  criticality: 3
  assertion_type: technical
  evidence_validity: P7D
  sensors: [code-gitleaks]
  rego_packages:
    - encryption.no_hardcoded_secrets
  guidance: |
    Pre-receive / PR secret scanning (gitleaks/trufflehog) blocks any merge
    containing detected credentials. Hits must be rotated even if blocked.

- id: CTRL-DATA-001
  title: Data retention and deletion lifecycle enforced on object stores
  soc2: [C1.1, P5.1, P5.2]
  iso27001: [A.8.10, A.5.34]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - data.lifecycle_enforced
  guidance: |
    Buckets holding customer/PII data have lifecycle rules (retention +
    deletion) matching the data-retention policy. Supports Privacy P5 and
    ISO A.8.10 (information deletion).
