# Catalog — Access Control
# SOC 2: CC6 (Logical & Physical Access). ISO 27001:2022: A.5.15-A.5.18, A.8.2-A.8.5, A.8.4.

- id: CTRL-ACCESS-001
  title: Enforce MFA on all human and privileged identities
  soc2: [CC6.1, CC6.6]
  iso27001: [A.8.2, A.8.5, A.5.17]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe, github-api]
  rego_packages:
    - access_control.iam_mfa_enforced
  guidance: |
    Every human IAM principal and every principal holding a privileged policy
    must have MFA active (hardware or TOTP). Programmatic access keys for humans
    are out of scope here — see CTRL-ACCESS-007.

- id: CTRL-ACCESS-003
  title: No identity/role may hold wildcard ("*") permissions
  soc2: [CC6.3]
  iso27001: [A.8.2, A.8.3]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe]
  rego_packages:
    - access_control.no_wildcard_policies
  guidance: |
    Deny managed/inline policies granting `Action: *` or `Resource: *`. Use
    scoped, least-privilege policies; break-glass roles are tracked under
    CTRL-ACCESS-009 (privileged utility programs, A.8.18) with compensating
    monitoring.

- id: CTRL-ACCESS-007
  title: No static long-term access keys for human identities (SSO/federation only)
  soc2: [CC6.1, CC6.2]
  iso27001: [A.8.2, A.8.4, A.5.16]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe]
  rego_packages:
    - access_control.no_human_access_keys
  guidance: |
    Human access to all three clouds is via federated SSO (e.g. IAM Identity
    Center / Entra ID / Cloud Identity). Long-lived access keys are permitted
    only for non-human service accounts and must rotate (see CTRL-ACCESS-011).

- id: CTRL-ACCESS-011
  title: Non-human credentials rotate within their maximum age
  soc2: [CC6.1]
  iso27001: [A.8.2, A.5.17]
  criticality: 2
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe]
  rego_packages:
    - access_control.service_account_key_age
  guidance: |
    Service-account keys / tokens older than the policy max age (default 90d)
    are flagged. Prefer workload identity / short-lived credentials over keys.

- id: CTRL-ACCESS-019
  title: Source-code repositories restrict access and require identity-based access
  soc2: [CC6.1, CC6.3]
  iso27001: [A.8.4, A.5.15]
  criticality: 2
  assertion_type: technical
  evidence_validity: P30D
  sensors: [github-api]
  rego_packages:
    - access_control.repo_access_restricted
  guidance: |
    Production repositories are not world-writable; access is granted to named
    identities/teams. Public repos are allowed only by explicit exception.
