# Catalog — Backup & Availability
# SOC 2: A1 (Availability). ISO 27001:2022: A.8.13 (backup), A.8.14 (redundancy), A.5.29/A.5.30 (continuity).

- id: CTRL-BKP-001
  title: Automated backups enabled on all production data stores
  soc2: [A1.2]
  iso27001: [A.8.13]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - backup.automated_backup_enabled
  guidance: |
    Managed databases, object stores (versioning), and persistent volumes in
    production have automated backups enabled with point-in-time recovery where
    supported.

- id: CTRL-BKP-003
  title: Backups are encrypted and stored separately from primary
  soc2: [A1.2, C1.1]
  iso27001: [A.8.13, A.8.24]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [cloud-steampipe]
  rego_packages:
    - backup.encrypted_and_separated
  guidance: |
    Backup destinations are encrypted at rest and in a different
    account/region/container than the primary to survive ransomware/loss.

- id: CTRL-BKP-006
  title: Backup restore tested on a defined cadence
  soc2: [A1.2, A1.3]
  iso27001: [A.8.13, A.5.30]
  criticality: 2
  assertion_type: procedural
  evidence_validity: P180D
  sensors: [scheduled-runner]
  rego_packages: []
  guidance: |
    A restore-from-backup test is performed and recorded at least semi-annually.
    Evidence is a signed manifest (see §15) with the test date and result.

- id: CTRL-AVAIL-001
  title: Production workloads deployed across multiple availability zones
  soc2: [A1.1, A1.3]
  iso27001: [A.8.14, A.8.6]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - availability.multi_az_required
  guidance: |
    Stateful and tier-1 production services span >= 2 availability zones
    (multi-AZ/multi-region per the service's availability target).
