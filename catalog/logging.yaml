# Catalog — Logging & Monitoring
# SOC 2: CC7 (System Operations). ISO 27001:2022: A.8.15 (logging), A.8.16 (monitoring), A.8.17 (clock).

- id: CTRL-LOG-001
  title: Management-plane audit logging enabled in all regions/accounts
  soc2: [CC7.2, CC7.3]
  iso27001: [A.8.15]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe]
  rego_packages:
    - logging.audit_log_enabled
  guidance: |
    CloudTrail (AWS, all regions + mgmt events), Activity Log (Azure, all
    subscriptions), and Cloud Audit Logs (GCP) are enabled org-wide. Logs are
    delivered to a centralized, access-restricted sink.

- id: CTRL-LOG-003
  title: Audit logs are immutable / write-once for their retention period
  soc2: [CC7.2]
  iso27001: [A.8.15]
  criticality: 3
  assertion_type: technical
  evidence_validity: P90D
  sensors: [cloud-steampipe]
  rego_packages:
    - logging.audit_log_immutable
  guidance: |
    Log buckets/containers have object-lock or immutable retention configured
    so logs cannot be altered or deleted within the retention window.

- id: CTRL-LOG-006
  title: Alerts configured for high-signal security events (root/privileged use)
  soc2: [CC7.2]
  iso27001: [A.8.16]
  criticality: 2
  assertion_type: technical
  evidence_validity: P30D
  sensors: [cloud-steampipe]
  rego_packages:
    - logging.metric_alarm_on_root_use
  guidance: |
    Root-account / break-glass usage and privileged API calls raise an alert to
    the security channel within minutes.

- id: CTRL-LOG-009
  title: System clocks are synchronised to a trusted time source
  soc2: [CC7.2]
  iso27001: [A.8.17]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [k8s-gatekeeper, cloud-steampipe]
  rego_packages:
    - logging.clock_synchronisation
  guidance: |
    Compute and k8s nodes enforce NTP/chrony synchronisation so log timestamps
    are correlatable across the estate.
