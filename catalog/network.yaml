# Catalog — Network
# SOC 2: CC6.6. ISO 27001:2022: A.8.20 (networks security), A.8.22 (segregation), A.8.21.

- id: CTRL-NET-001
  title: No data-tier resource may be publicly reachable
  soc2: [CC6.6]
  iso27001: [A.8.20, A.8.22]
  criticality: 3
  assertion_type: technical
  evidence_validity: P30D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - network.no_public_data_resources
  guidance: |
    Databases, object stores holding non-public data, and internal services are
    not exposed to the public internet. Storage public-access blocks are on.

- id: CTRL-NET-004
  title: Production network access is restricted and segmented
  soc2: [CC6.6]
  iso27001: [A.8.20, A.8.22, A.8.21]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - network.prod_segmentation
  guidance: |
    Production runs in dedicated VPCs/VNets with segmentation between tiers
    (e.g. private subnets for data, security groups denying wide ingress).

- id: CTRL-NET-008
  title: TLS 1.2+ enforced on all public endpoints and load balancers
  soc2: [CC6.7, C1.2]
  iso27001: [A.8.24, A.8.22]
  criticality: 2
  assertion_type: technical
  evidence_validity: P90D
  sensors: [terraform-conftest, cloud-steampipe]
  rego_packages:
    - network.tls_12_required
  guidance: |
    Load balancers, API gateways, and CDN fronts negotiate TLS 1.2 minimum;
    legacy protocols (SSLv3, TLS 1.0/1.1) are disabled.
