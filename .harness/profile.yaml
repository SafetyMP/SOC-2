schema: harness-contract/v1
profile: solo
version: 2026-07
signed: null
integration_executor: null
stack:
  detected:
  - python
  primary: python
  monorepo: false
  compose: false
requires:
  files:
  - AGENTS.md
  - scripts/verify.sh
  - .cursor/hooks.json
  - .harness/profile.yaml
  - .harness/VERSION
  hooks:
    stop: verify-on-stop
  commands:
    verify: ./scripts/verify.sh
    integration: null
bundles_applied:
- cloud-guards
- verify-on-stop
forbidden:
- path: specs/MANDATE.md
  condition: 'Status: ACTIVE without fleet-instruction bundle'
verify:
  timeout_seconds: 120
  loop_limit: 3
  skip_env: CURSOR_VERIFY_SKIP
extensions:
  fleet: null
  eval: null
harness_disclosure:
  schema: harness-disclosure/v1
  scope: repo
  repo_harness:
    profile: solo
    bundles_applied: []
    verify:
      cmd: ./scripts/verify.sh
      integration_cmd: null
      hermetic_stop_only: true
      stop_verify: project-verify-on-stop
      cloud_verify: null
    agents_md_lines: null
  effective:
    global_version: null
    global_hash: null
    repo_hash: null
    effective_hash: null
    runtime: ide
    inner_harness_uncontrolled: true
  last_check_at: null
  last_verify_exit: null
