name: iac-gate

# L7 enforcement gate (design §12). Runs the Rego policy library over the
# sample Terraform plan in WARN mode (reports, does not block) — the burn-in
# posture. Promote a gate to BLOCK by changing the mode to `enforce` once it
# shows a sustained clean signal.

on:
  push:
    branches: [main]
    paths: ["terraform-examples/**", "policies/**", "sensors/terraform.py", "scripts/iac_gate.sh"]
  pull_request:
    branches: [main]
    paths: ["terraform-examples/**", "policies/**", "sensors/terraform.py", "scripts/iac_gate.sh"]

jobs:
  iac-policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.5.7" }
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/opa
      - name: Run IaC gate (warn)
        run: bash scripts/iac_gate.sh warn
